<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="Content-Security-Policy"
        content="default-src 'self' https://appsforoffice.microsoft.com 'unsafe-inline' 'unsafe-eval';
               connect-src 'self' https://appsforoffice.microsoft.com;
               style-src 'self' 'unsafe-inline';
               img-src 'self' data: https:;">
  <title>AI Excel</title>
  <link rel="stylesheet" href="taskpane.css">
</head>
<body>
  <!-- Config Panel -->
  <div id="config-panel" class="config-panel hidden">
    <div class="config-header">
      <h2>⚙️ Settings</h2>
      <button id="config-close" class="icon-btn">&times;</button>
    </div>
    <div class="config-body">
      <label>Endpoint URL</label>
      <input type="url" id="cfg-endpoint" placeholder="https://api.openai.com/v1/chat/completions" />
      <label>API Key</label>
      <input type="password" id="cfg-apikey" placeholder="sk-..." />
      <label>Model</label>
      <input type="text" id="cfg-model" placeholder="gpt-4, claude-sonnet-4, ..." />
      <label>Temperature</label>
      <div class="temp-row">
        <input type="range" id="cfg-temp" min="0" max="2" step="0.1" value="0.7" />
        <span id="cfg-temp-val">0.7</span>
      </div>
      <button id="cfg-save" class="btn primary">Save</button>
    </div>
  </div>

  <!-- Main Chat UI -->
  <div id="app">
    <header>
      <h1>AI Excel</h1>
      <button id="config-btn" class="icon-btn">⚙️</button>
    </header>

    <div id="chat-messages">
      <div class="msg ai">
        <div class="msg-content">Hi! I'm your AI assistant for Excel. Open ⚙️ Settings to enter your endpoint & API key, then ask anything. Or use <code>=AI(prompt)</code> in a cell.</div>
      </div>
    </div>

    <div id="status-bar" class="hidden"></div>

    <div id="input-area">
      <textarea id="chat-input" rows="2" placeholder="Ask anything..."></textarea>
      <button id="send-btn" class="btn primary" title="Send">➤</button>
    </div>
  </div>

  <script src="https://appsforoffice.microsoft.com/lib/1.1/hosted/office.js"></script>
  <script src="taskpane.js"></script>
</body>
</html>
